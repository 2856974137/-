<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>H5GG 橘子整合脚本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: transparent;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        #container {
            width: 100%;
            height: 100%;
            background: rgba(135, 206, 250, 0.12);
            border-radius: 10px;
            padding: 6px 6px 4px 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid rgba(135, 206, 250, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            gap: 3px;
            position: relative;
            box-shadow: 0 4px 15px rgba(135, 206, 250, 0.15);
        }

        .settings-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: rgba(135, 206, 250, 0.15);
            border: 1px solid rgba(135, 206, 250, 0.5);
            color: #87CEFA;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .settings-btn:hover {
            background: rgba(135, 206, 250, 0.3);
            border-color: rgba(135, 206, 250, 0.8);
            transform: scale(1.1);
        }

        .settings-panel {
            position: absolute;
            top: 26px;
            right: 5px;
            width: 160px;
            background: rgba(135, 206, 250, 0.15);
            border-radius: 8px;
            border: 1px solid rgba(135, 206, 250, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 8px;
            display: none;
            flex-direction: column;
            gap: 6px;
            box-shadow: 0 4px 12px rgba(135, 206, 250, 0.12);
            z-index: 9;
        }

        .settings-panel.show {
            display: flex;
        }

        .settings-title {
            color: #E0F7FF;
            font-size: 9px;
            font-weight: 600;
            text-align: center;
            padding-bottom: 3px;
            border-bottom: 1px solid rgba(135, 206, 250, 0.25);
        }

        .game-switch-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .game-name {
            color: #E0F7FF;
            font-size: 8px;
        }

        .toggle-switch {
            position: relative;
            width: 28px;
            height: 14px;
            border-radius: 7px;
            background: rgba(135, 206, 250, 0.1);
            border: 1px solid rgba(135, 206, 250, 0.3);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 1px;
            left: 1px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #B0E2FF;
            transition: left 0.2s ease;
        }

        .toggle-switch.active {
            background: rgba(135, 206, 250, 0.4);
            border-color: rgba(135, 206, 250, 0.8);
        }

        .toggle-switch.active::after {
            left: 15px;
            background: #87CEFA;
        }

        .title {
            color: #E0F7FF;
            font-size: 11px;
            font-weight: 600;
            margin: 2px 0;
            text-align: center;
            text-shadow: 0 0 5px rgba(135, 206, 250, 0.7);
            flex-shrink: 0;
        }

        .btn {
            width: 92%;
            padding: 4px 0;
            margin: 1px 0;
            background: rgba(135, 206, 250, 0.1);
            border: 1px solid rgba(135, 206, 250, 0.3);
            color: #E0F7FF;
            font-size: 9px;
            font-weight: 500;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            outline: none;
            transition: all 0.2s ease;
            box-shadow: inset 0 1px 2px rgba(135, 206, 250, 0.08);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(135, 206, 250, 0.12), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover {
            background: rgba(135, 206, 250, 0.25);
            border-color: rgba(135, 206, 250, 0.6);
            transform: scale(1.015);
            box-shadow: 0 2px 6px rgba(135, 206, 250, 0.15);
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:active {
            background: rgba(135, 206, 250, 0.35);
            transform: scale(0.98);
            box-shadow: inset 0 1px 3px rgba(135, 206, 250, 0.12);
        }

        #addressBox {
            width: 92%;
            padding: 4px 0;
            margin: 3px 0 0 0;
            background: rgba(135, 206, 250, 0.08);
            border: 1px solid rgba(135, 206, 250, 0.3);
            color: #87CEFA;
            font-size: 9px;
            text-align: center;
            border-radius: 5px;
            min-height: 14px;
            cursor: pointer;
            user-select: all;
            flex-shrink: 0;
            box-shadow: inset 0 1px 2px rgba(135, 206, 250, 0.08);
            transition: all 0.2s ease;
        }

        #addressBox:hover {
            border-color: rgba(135, 206, 250, 0.6);
            background: rgba(135, 206, 250, 0.12);
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="settings-btn" id="settingsBtn">⚙️</div>
        
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-title">选择游戏</div>
            <div class="game-switch-item">
                <span class="game-name">腾讯桌球</span>
                <div class="toggle-switch" data-game="gameA"></div>
            </div>
            <div class="game-switch-item">
                <span class="game-name">游戏B</span>
                <div class="toggle-switch" data-game="gameB"></div>
            </div>
            <div class="game-switch-item">
                <span class="game-name">游戏C</span>
                <div class="toggle-switch" data-game="gameC"></div>
            </div>
        </div>

        <div class="title" id="mainTitle">橘子整合脚本</div>
        <button class="btn" id="btn1">功能一</button>
        <button class="btn" id="btn2">功能二</button>
        <button class="btn" id="btn3">功能三</button>
        <div id="addressBox">点击功能按钮获取地址</div>
    </div>

    <script>
        // 全局变量
        let currentAddress = null;
        let currentGame = null;
        
        // 延长线专用变量
        let valueHackActive = false;
        let hackIntervalId = null;
        let targetResults = [];
        let lockedAddresses = [];

        // ========== 工具函数 ==========
        function copyAddress() {
            if (!currentAddress) return;
            const fullAddress = `0x${currentAddress}`;
            const display = document.getElementById("addressBox");

            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(fullAddress)
                    .then(() => showTempMessage(display, `✅ 已复制: ${fullAddress}`))
                    .catch(() => fallbackCopy(fullAddress, display));
            } else {
                fallbackCopy(fullAddress, display);
            }
        }

        function fallbackCopy(text, display) {
            const textarea = document.createElement("textarea");
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand("copy");
            document.body.removeChild(textarea);
            showTempMessage(display, `✅ 已复制: ${text}`);
        }

        function showTempMessage(el, msg, duration = 1000) {
            const originalText = el.innerText;
            el.innerText = msg;
            setTimeout(() => el.innerText = originalText, duration);
        }

        // ========== 封装：超级延长线核心逻辑 ==========
        function runExtendLine() {
            try {
                if (valueHackActive) {
                    clearInterval(hackIntervalId);
                    hackIntervalId = null;
                    h5gg.clearResults(); 
                    lockedAddresses = [];
                    targetResults = [];
                    valueHackActive = false;
                    document.getElementById('addressBox').innerText = "✅ 已关闭延长线";
                    return;
                }

                h5gg.clearResults(); 
                targetResults = [];
                lockedAddresses = [];

                h5gg.searchNumber('3233808384', 'I64', '0x100000000', '0x200000000');
                h5gg.searchNearby('64', 'I32', '0x20');

                const allResults = h5gg.getResults(h5gg.getResultsCount());
                targetResults = allResults.filter(item => item.value === '64');

                if (targetResults.length === 0) {
                    document.getElementById('addressBox').innerText = "❌ 未找到目标";
                    h5gg.clearResults();
                    return;
                }

                hackIntervalId = setInterval(() => {
                    targetResults.forEach(result => {
                        const targetAddr = Number(result.address) + 92;
                        const fullAddr = '0x' + targetAddr.toString(16).toUpperCase();
                        h5gg.setValue(fullAddr, 9999, 'F32');
                        
                        if (!lockedAddresses.includes(fullAddr)) {
                            lockedAddresses.push(fullAddr);
                            currentAddress = targetAddr.toString(16).toUpperCase();
                        }
                    });
                }, 1);

                valueHackActive = true;
                document.getElementById('addressBox').innerText = `✅ 已锁定 ${targetResults.length} 个地址`;

            } catch (e) {
                document.getElementById('addressBox').innerText = "❌ 脚本错误";
            }
        }

        // ========== 游戏选择与按钮配置 ==========
        function initGameSwitches() {
            const switches = document.querySelectorAll('.toggle-switch');
            switches.forEach(switchEl => {
                switchEl.addEventListener('click', function() {
                    const gameKey = this.dataset.game;
                    
                    switches.forEach(s => s.classList.remove('active'));
                    
                    if (currentGame === gameKey) {
                        currentGame = null;
                        resetBtnText();
                        document.getElementById('addressBox').innerText = "已取消游戏选择";
                        return;
                    }
                    
                    this.classList.add('active');
                    currentGame = gameKey;
                    updateBtnConfig(gameKey);
                    document.getElementById('addressBox').innerText = `✅ 已选择: ${getGameName(gameKey)}`;
                });
            });
        }

        function getGameName(key) {
            const names = { gameA: "腾讯桌球", gameB: "游戏B", gameC: "游戏C" };
            return names[key] || "未知游戏";
        }

        function resetBtnText() {
            document.getElementById('btn1').innerText = "功能一";
            document.getElementById('btn2').innerText = "功能二";
            document.getElementById('btn3').innerText = "功能三";
            
            document.getElementById('btn1').onclick = () => document.getElementById('addressBox').innerText = "请先选择游戏";
            document.getElementById('btn2').onclick = () => document.getElementById('addressBox').innerText = "请先选择游戏";
            document.getElementById('btn3').onclick = () => document.getElementById('addressBox').innerText = "请先选择游戏";
        }

        function updateBtnConfig(gameKey) {
            const btn1 = document.getElementById('btn1');
            const btn2 = document.getElementById('btn2');
            const btn3 = document.getElementById('btn3');

            if (gameKey === 'gameA') {
                btn1.innerText = "↓一关一开↓";
                btn2.innerText = "超级延长线";
                btn3.innerText = "↑再次点击关闭↑";

                btn1.onclick = () => document.getElementById('addressBox').innerText = "该功能未启用";
                btn2.onclick = runExtendLine; // 整洁调用封装好的函数
                btn3.onclick = () => document.getElementById('addressBox').innerText = "该功能未启用";

            } else if (gameKey === 'gameB') {
                btn1.innerText = "游戏B-功能一";
                btn2.innerText = "游戏B-功能二";
                btn3.innerText = "游戏B-功能三";

                btn1.onclick = () => document.getElementById('addressBox').innerText = "该功能未启用";
                btn2.onclick = () => document.getElementById('addressBox').innerText = "该功能未启用";
                btn3.onclick = () => document.getElementById('addressBox').innerText = "该功能未启用";

            } else if (gameKey === 'gameC') {
                btn1.innerText = "游戏C-功能一";
                btn2.innerText = "游戏C-功能二";
                btn3.innerText = "游戏C-功能三";

                btn1.onclick = () => document.getElementById('addressBox').innerText = "该功能未启用";
                btn2.onclick = () => document.getElementById('addressBox').innerText = "该功能未启用";
                btn3.onclick = () => document.getElementById('addressBox').innerText = "该功能未启用";
            }
        }

        // ========== 设置面板交互 ==========
        function initSettingsPanel() {
            const settingsBtn = document.getElementById('settingsBtn');
            const settingsPanel = document.getElementById('settingsPanel');
            
            settingsBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                settingsPanel.classList.toggle('show');
            });
            
            document.addEventListener('click', function(e) {
                if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) {
                    settingsPanel.classList.remove('show');
                }
            });
        }

        // ========== 页面初始化 ==========
        window.onload = function() {
            const FIXED_WIDTH = 180;
            const FIXED_HEIGHT = 150;

            setWindowRect(0, 0, FIXED_WIDTH, FIXED_HEIGHT);
            setWindowDrag(0, 0, FIXED_WIDTH, FIXED_HEIGHT);
            setWindowTouch(true);

            setLayoutAction(function(screenWidth, screenHeight) {
                const centerX = (screenWidth - FIXED_WIDTH) / 2;
                const centerY = (screenHeight - FIXED_HEIGHT) / 2;
                setWindowRect(centerX, centerY, FIXED_WIDTH, FIXED_HEIGHT);
                setWindowVisible(true);
            });

            document.body.onselectstart = document.body.ondragstart = () => false;
            document.getElementById('addressBox').onclick = copyAddress;

            initGameSwitches();
            initSettingsPanel();
            resetBtnText();
        };
    </script>
</body>
</html>
